# Ruff configuration for Truthound Integrations
# https://docs.astral.sh/ruff/configuration/

# Target Python version
target-version = "py311"

# Maximum line length
line-length = 100

# Exclude directories
exclude = [
    ".git",
    ".github",
    ".mypy_cache",
    ".pytest_cache",
    ".ruff_cache",
    ".venv",
    "__pypackages__",
    "_build",
    "build",
    "dist",
    "node_modules",
    "venv",
    "*.egg-info",
]

[lint]
# Blocking CI rules for first-party surfaces
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "SIM",    # flake8-simplify
    "T10",    # flake8-debugger
    "RUF",    # ruff-specific rules
]

# Ignore specific rules
ignore = [
    "E501",     # line too long (handled by formatter)
    "RUF022",   # __all__ not sorted (we use semantic grouping with comments)
]

# Allow unused variables when underscore-prefixed
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

# Per-file ignores
[lint.per-file-ignores]
"tests/**/*.py" = [
    "S101",     # assert statements in tests
]

[lint.isort]
# isort configuration
known-first-party = [
    "common",
    "truthound_airflow",
    "truthound_dagster",
    "truthound_dbt",
    "truthound_prefect",
    "truthound_mage",
    "truthound_kestra",
]
force-single-line = false
lines-after-imports = 2
combine-as-imports = true
split-on-trailing-comma = true

[format]
# Formatter configuration
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = 80
