name: Dagster

on:
  workflow_call:
    inputs:
      lane:
        required: false
        type: string
        default: pr
  workflow_dispatch:
    inputs:
      lane:
        description: CI lane to emulate
        required: true
        default: pr
        type: choice
        options:
          - pr
          - main
          - release
          - nightly

concurrency:
  group: dagster-${{ github.event.pull_request.number || github.ref }}-${{ inputs.lane || github.event.inputs.lane || 'manual' }}
  cancel-in-progress: true

jobs:
  matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      truthound_range: ${{ steps.export.outputs.truthound_range }}
      host_matrix: ${{ steps.export.outputs.host_matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - id: export
        name: Export support matrix
        run: |
          python scripts/ci/export_support_matrix.py workflow \
            --workflow dagster \
            --lane "${{ inputs.lane || github.event.inputs.lane || 'pr' }}" \
            --github-output "$GITHUB_OUTPUT"

  dagster:
    needs: matrix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.host_matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            ci/support-matrix.toml
      - name: Install Dagster dependencies
        run: |
          python -m pip install --upgrade pip
          mkdir -p artifacts/dagster/generated
          python - <<'PY'
          import json
          from pathlib import Path

          constraints = json.loads(r'''${{ toJSON(matrix.constraints) }}''')
          constraint_urls = json.loads(r'''${{ toJSON(matrix.constraint_urls) }}''')
          output_dir = Path("artifacts/dagster/generated")
          output_dir.mkdir(parents=True, exist_ok=True)
          (output_dir / "constraints.txt").write_text(
              "\n".join(constraints) + ("\n" if constraints else ""),
              encoding="utf-8",
          )
          (output_dir / "constraint-urls.txt").write_text(
              "\n".join(constraint_urls) + ("\n" if constraint_urls else ""),
              encoding="utf-8",
          )
          PY
          install_args=()
          if [ -s artifacts/dagster/generated/constraint-urls.txt ]; then
            while IFS= read -r constraint_url; do
              [ -n "${constraint_url}" ] || continue
              install_args+=(--constraint "${constraint_url}")
            done < artifacts/dagster/generated/constraint-urls.txt
          fi
          if [ -s artifacts/dagster/generated/constraints.txt ]; then
            install_args+=(-c artifacts/dagster/generated/constraints.txt)
          fi
          python -m pip install "${install_args[@]}" "dagster==${{ matrix.version }}"
          python -m pip install "${install_args[@]}" -e ".[dagster,opentelemetry]" "truthound${{ needs.matrix.outputs.truthound_range }}"
          python -m pip install pytest pytest-cov pytest-asyncio pytest-xdist
      - name: Run Dagster suites
        run: |
          set -euo pipefail
          mkdir -p artifacts/dagster
          python -m pytest -q \
            packages/dagster/tests/test_resources.py \
            packages/dagster/tests/test_assets.py \
            packages/dagster/tests/test_ops.py \
            packages/dagster/tests/test_utils.py \
            --junitxml="artifacts/dagster/junit-${{ matrix.version }}.xml" \
            --cov=common \
            --cov=packages/dagster/src/truthound_dagster \
            --cov-report="xml:artifacts/dagster/coverage-${{ matrix.version }}.xml" | tee "artifacts/dagster/pytest-${{ matrix.version }}.log"
      - name: Upload Dagster artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: truthound-dagster-${{ matrix.version }}
          path: artifacts/dagster/*

  summary:
    if: always()
    needs:
      - dagster
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Validate Dagster results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python - <<'PY'
          import json
          import os
          needs = json.loads(os.environ["NEEDS_JSON"])
          failures = {
              name: details["result"]
              for name, details in needs.items()
              if details["result"] not in {"success", "skipped"}
          }
          if failures:
              raise SystemExit(f"Dagster CI failed: {failures}")
          print("Dagster summary passed")
          PY
