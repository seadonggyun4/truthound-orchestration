name: Shared Runtime

on:
  workflow_call:
    inputs:
      lane:
        required: false
        type: string
        default: pr
      suite_tier:
        required: false
        type: string
        default: smoke
  workflow_dispatch:
    inputs:
      lane:
        description: CI lane to emulate
        required: true
        default: pr
        type: choice
        options:
          - pr
          - main
          - release
          - nightly
      suite_tier:
        description: Test breadth to execute
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - full

concurrency:
  group: shared-runtime-${{ github.event.pull_request.number || github.ref }}-${{ inputs.lane || github.event.inputs.lane || 'manual' }}-${{ inputs.suite_tier || github.event.inputs.suite_tier || 'smoke' }}
  cancel-in-progress: true

jobs:
  matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      python_matrix: ${{ steps.export.outputs.python_matrix }}
      truthound_range: ${{ steps.export.outputs.truthound_range }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - id: export
        name: Export support matrix
        run: |
          python scripts/ci/export_support_matrix.py workflow \
            --workflow shared-runtime \
            --lane "${{ inputs.lane || github.event.inputs.lane || 'pr' }}" \
            --github-output "$GITHUB_OUTPUT"

  shared-runtime:
    needs: matrix
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.python_matrix) }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            ci/support-matrix.toml
      - name: Install shared runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,opentelemetry]" "truthound${{ needs.matrix.outputs.truthound_range }}"
      - name: Run shared runtime suites
        env:
          SUITE_TIER: ${{ inputs.suite_tier || github.event.inputs.suite_tier || 'smoke' }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/shared-runtime
          if [ "${SUITE_TIER}" = "full" ]; then
            TESTS="
            tests/common/test_ci_support_matrix.py
            tests/common/test_ci_workflow_actions.py
            tests/common/test_adapter_test_layout.py
            tests/common/test_runtime_contracts.py
            tests/common/test_platform_boundaries.py
            tests/common/test_depot_client.py
            tests/common/test_depot_failures.py
            tests/common/test_depot_flow_models.py
            tests/common/test_depot_flow_observability.py
            tests/common/test_depot_flow_runtime.py
            tests/common/test_depot_flow_serialization.py
            tests/common/test_depot_idempotency.py
            tests/common/test_depot_models.py
            tests/common/test_depot_redaction.py
            tests/common/test_depot_retry_policy.py
            tests/common/test_depot_runtime_boundaries.py
            tests/common/test_depot_runtime_integration.py
            tests/common/test_depot_runtime_observability.py
            tests/common/test_depot_runtime_serialization.py
            tests/common/test_depot_serialization.py
            tests/common/test_truthound_capabilities.py
            tests/common/test_truthound_streaming.py
            tests/common/test_truthound_v3_contract.py
            tests/opentelemetry/test_config.py
            "
          else
            TESTS="
            tests/common/test_ci_support_matrix.py
            tests/common/test_ci_workflow_actions.py
            tests/common/test_adapter_test_layout.py
            tests/common/test_runtime_contracts.py
            tests/common/test_platform_boundaries.py
            tests/common/test_depot_models.py
            tests/common/test_depot_failures.py
            tests/common/test_depot_runtime_integration.py
            tests/common/test_depot_flow_runtime.py
            tests/common/test_depot_redaction.py
            "
          fi
          python -m pytest -q \
            ${TESTS} \
            --junitxml="artifacts/shared-runtime/junit-${{ matrix.python_version }}.xml" \
            --cov=common \
            --cov-report="xml:artifacts/shared-runtime/coverage-${{ matrix.python_version }}.xml" | tee "artifacts/shared-runtime/pytest-${{ matrix.python_version }}.log"
      - name: Upload shared runtime artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: truthound-shared-runtime-${{ matrix.python_version }}
          path: artifacts/shared-runtime/*

  summary:
    if: always()
    needs:
      - shared-runtime
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Validate shared runtime results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python - <<'PY'
          import json
          import os
          needs = json.loads(os.environ["NEEDS_JSON"])
          failures = {
              name: details["result"]
              for name, details in needs.items()
              if details["result"] not in {"success", "skipped"}
          }
          if failures:
              raise SystemExit(f"Shared runtime failed: {failures}")
          print("Shared runtime summary passed")
          PY
