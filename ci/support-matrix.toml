[python]
min = "3.11"
primary = "3.12"
canary = "3.13"

[truthound]
range = ">=3.0,<4.0"
primary = "3.0.0"

[platforms.airflow]
required = true
extra = "airflow"
min = "2.6.0"
primary = "3.1.8"

[platforms.airflow.ci.min]
python = "3.11"
constraints = []
constraint_urls = ["https://raw.githubusercontent.com/apache/airflow/constraints-2.6.0/constraints-3.11.txt"]

[platforms.airflow.ci.primary]
python = "3.12"
constraints = []
constraint_urls = []

[platforms.prefect]
required = true
extra = "prefect"
min = "2.14.0"
primary = "3.6.22"

[platforms.prefect.ci.min]
python = "3.11"
constraints = [
    "anyio<4.0.0",
    "griffe<1.0.0",
    "pendulum<3.0.0",
    "starlette<0.28.0",
]
constraint_urls = []

[platforms.prefect.ci.primary]
python = "3.12"
constraints = []
constraint_urls = []

[platforms.dagster]
required = true
extra = "dagster"
min = "1.5.0"
primary = "1.12.18"

[platforms.dagster.ci.min]
python = "3.11"
constraints = ["pendulum<3.0.0"]
constraint_urls = []

[platforms.dagster.ci.primary]
python = "3.12"
constraints = []
constraint_urls = []

[platforms.mage]
required = true
extra = "mage"
runtime_expectation = "Inside a Mage runtime that already provides mage-ai"

[platforms.kestra]
required = true
extra = "kestra"
min = "1.3.0"
primary = "1.3.0"
runtime_expectation = "Kestra runtime with generated scripts and templates"

[platforms.dbt]
required = true
extra = "dbt"
execution_target = "postgres"
core_range = "dbt-core>=1.10.0,<1.11.0"
execution_core_version = "1.10.20"
execution_adapter_version = "1.10.0"
coverage_threshold = 0.8

[dbt.compile_adapters]
postgres = "dbt-postgres>=1.10.0,<1.11.0"
snowflake = "dbt-snowflake>=1.10.0,<1.11.0"
bigquery = "dbt-bigquery>=1.10.0,<1.11.0"
redshift = "dbt-redshift>=1.10.0,<1.11.0"
databricks = "dbt-databricks>=1.10.0,<1.11.0"

[wheel_smoke]
extras = ["base", "airflow", "prefect", "dagster", "dbt", "opentelemetry"]

[security]
python = "primary"
blocking_surfaces = ["base", "airflow", "prefect", "dagster", "dbt", "kestra", "opentelemetry"]
canary_surfaces = ["all"]

[security.surfaces.base]
extra = ""
host_requirements = ["truthound==3.0.0"]
constraints = []
constraint_urls = []

[security.surfaces.airflow]
extra = "airflow"
host_requirements = ["truthound==3.0.0", "apache-airflow==3.1.8"]
constraints = ["cryptography>=46.0.5", "pyjwt>=2.12.0"]
constraint_urls = []

[security.surfaces.prefect]
extra = "prefect"
host_requirements = ["truthound==3.0.0", "prefect==3.6.22", "starlette==0.49.1"]
constraints = [
    "cryptography>=46.0.5",
    "protobuf>=5.29.6",
    "pyjwt>=2.12.0",
    "starlette==0.49.1",
]
constraint_urls = []

[security.surfaces.dagster]
extra = "dagster"
host_requirements = ["truthound==3.0.0", "dagster==1.12.18"]
constraints = []
constraint_urls = []

[security.surfaces.dbt]
extra = "dbt"
host_requirements = ["truthound==3.0.0", "dbt-core==1.10.20", "dbt-postgres==1.10.0"]
constraints = []
constraint_urls = []

[security.surfaces.kestra]
extra = "kestra"
host_requirements = ["truthound==3.0.0", "kestra==1.3.0"]
constraints = []
constraint_urls = []

[security.surfaces.opentelemetry]
extra = "opentelemetry"
host_requirements = [
    "truthound==3.0.0",
    "opentelemetry-api==1.40.0",
    "opentelemetry-sdk==1.40.0",
    "opentelemetry-exporter-otlp-proto-grpc==1.40.0",
    "opentelemetry-exporter-otlp-proto-http==1.40.0",
]
constraints = [
    "cryptography>=46.0.5",
    "googleapis-common-protos>=1.57,<2",
    "protobuf>=5.29.6,<6",
]
constraint_urls = []

[security.surfaces.all]
extra = "all"
host_requirements = ["truthound==3.0.0"]
constraints = []
constraint_urls = []

[advanced_tier]
engines = ["great_expectations", "pandera"]

[lanes.pr]
foundation_python = ["primary"]
shared_runtime_python = ["primary"]
airflow_versions = ["primary"]
prefect_versions = ["primary"]
dagster_versions = ["primary"]
mage_kestra_python = ["primary"]
dbt_compile_targets = ["postgres"]
dbt_execution = false

[lanes.main]
foundation_python = ["primary"]
shared_runtime_python = ["primary"]
airflow_versions = ["min", "primary"]
prefect_versions = ["min", "primary"]
dagster_versions = ["min", "primary"]
mage_kestra_python = ["primary"]
dbt_compile_targets = ["postgres", "snowflake", "bigquery", "redshift", "databricks"]
dbt_execution = true

[lanes.release]
foundation_python = ["primary"]
shared_runtime_python = ["primary"]
airflow_versions = ["min", "primary"]
prefect_versions = ["min", "primary"]
dagster_versions = ["min", "primary"]
mage_kestra_python = ["primary"]
dbt_compile_targets = ["postgres", "snowflake", "bigquery", "redshift", "databricks"]
dbt_execution = true

[lanes.nightly]
foundation_python = ["primary"]
shared_runtime_python = ["min", "primary", "canary"]
airflow_versions = ["primary"]
prefect_versions = ["primary"]
dagster_versions = ["primary"]
mage_kestra_python = ["primary"]
dbt_compile_targets = ["postgres", "snowflake", "bigquery", "redshift", "databricks"]
dbt_execution = true
