name: Security

on:
  pull_request:
  push:
    branches: ["main"]
  schedule:
    - cron: "30 18 * * *"
  workflow_call:
    inputs:
      lane:
        required: false
        type: string
        default: release
  workflow_dispatch:
    inputs:
      lane:
        description: Security lane to emulate
        required: true
        default: release
        type: choice
        options:
          - pr
          - main
          - release
          - nightly

concurrency:
  group: security-${{ github.event.pull_request.number || github.ref }}-${{ inputs.lane || github.event.inputs.lane || 'event' }}
  cancel-in-progress: true

jobs:
  matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      python_version: ${{ steps.export.outputs.python_version }}
      blocking_matrix: ${{ steps.export.outputs.blocking_matrix }}
      canary_matrix: ${{ steps.export.outputs.canary_matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - id: export
        name: Render security audit surfaces
        run: |
          python scripts/ci/export_support_matrix.py render-security \
            --github-output "$GITHUB_OUTPUT"

  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: reviewdog/action-actionlint@a5524e1c19e62881d79c1f1b9b6f09f16356e281 # v1.65.2
        with:
          github_token: ${{ github.token }}
          reporter: github-check
          fail_level: error

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  pip-audit:
    if: github.event_name == 'push' || ((github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch') && (inputs.lane || github.event.inputs.lane || 'release') != 'pr' && (inputs.lane || github.event.inputs.lane || 'release') != 'nightly')
    needs: matrix
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.blocking_matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.matrix.outputs.python_version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            ci/support-matrix.toml
      - name: Write blocking security inputs
        env:
          HOST_REQUIREMENTS_JSON: ${{ toJSON(matrix.host_requirements) }}
          CONSTRAINTS_JSON: ${{ toJSON(matrix.constraints) }}
          IGNORE_VULNS_JSON: ${{ toJSON(matrix.ignore_vulns) }}
          CONSTRAINT_URLS_JSON: ${{ toJSON(matrix.constraint_urls) }}
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import os

          output_dir = Path("artifacts/security/generated")
          output_dir.mkdir(parents=True, exist_ok=True)
          requirements = json.loads(os.environ["HOST_REQUIREMENTS_JSON"])
          constraints = json.loads(os.environ["CONSTRAINTS_JSON"])
          ignore_vulns = json.loads(os.environ["IGNORE_VULNS_JSON"])
          constraint_urls = json.loads(os.environ["CONSTRAINT_URLS_JSON"])
          (output_dir / "requirements-host.txt").write_text("\n".join(requirements) + "\n", encoding="utf-8")
          constraint_text = "\n".join(constraints) + ("\n" if constraints else "")
          (output_dir / "constraints.txt").write_text(constraint_text, encoding="utf-8")
          (output_dir / "ignore-vulns.txt").write_text(
              "\n".join(ignore_vulns) + ("\n" if ignore_vulns else ""),
              encoding="utf-8",
          )
          (output_dir / "constraint-urls.txt").write_text(
              "\n".join(constraint_urls) + ("\n" if constraint_urls else ""),
              encoding="utf-8",
          )
          PY
      - name: Install blocking audit dependencies
        env:
          EXTRA: ${{ matrix.extra }}
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          install_args=()
          if [ -s artifacts/security/generated/constraint-urls.txt ]; then
            while IFS= read -r constraint_url; do
              [ -n "${constraint_url}" ] || continue
              install_args+=(--constraint "${constraint_url}")
            done < artifacts/security/generated/constraint-urls.txt
          fi
          if [ -s artifacts/security/generated/constraints.txt ]; then
            install_args+=(-c artifacts/security/generated/constraints.txt)
          fi
          install_args+=(-r artifacts/security/generated/requirements-host.txt)
          python -m pip install "${install_args[@]}"
          package_target="."
          if [ -n "${EXTRA}" ]; then
            package_target=".[${EXTRA}]"
          fi
          python -m pip install --no-deps -e "${package_target}"
      - name: Run pip-audit
        run: |
          set -euo pipefail
          mkdir -p artifacts/security
          audit_args=()
          if [ -s artifacts/security/generated/ignore-vulns.txt ]; then
            while IFS= read -r vuln_id; do
              [ -n "${vuln_id}" ] || continue
              audit_args+=(--ignore-vuln "${vuln_id}")
            done < artifacts/security/generated/ignore-vulns.txt
          fi
          pip-audit --local --progress-spinner off "${audit_args[@]}" | tee "artifacts/security/pip-audit-${{ matrix.label }}.log"
      - name: Upload blocking security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: truthound-security-${{ matrix.label }}
          path: artifacts/security/*

  pip-audit-canary:
    if: github.event_name == 'schedule' || ((github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch') && (inputs.lane || github.event.inputs.lane || 'release') == 'nightly')
    needs: matrix
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.canary_matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.matrix.outputs.python_version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            ci/support-matrix.toml
      - name: Write canary security inputs
        env:
          HOST_REQUIREMENTS_JSON: ${{ toJSON(matrix.host_requirements) }}
          CONSTRAINTS_JSON: ${{ toJSON(matrix.constraints) }}
          IGNORE_VULNS_JSON: ${{ toJSON(matrix.ignore_vulns) }}
          CONSTRAINT_URLS_JSON: ${{ toJSON(matrix.constraint_urls) }}
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import os

          output_dir = Path("artifacts/security/generated")
          output_dir.mkdir(parents=True, exist_ok=True)
          requirements = json.loads(os.environ["HOST_REQUIREMENTS_JSON"])
          constraints = json.loads(os.environ["CONSTRAINTS_JSON"])
          ignore_vulns = json.loads(os.environ["IGNORE_VULNS_JSON"])
          constraint_urls = json.loads(os.environ["CONSTRAINT_URLS_JSON"])
          (output_dir / "requirements-host.txt").write_text("\n".join(requirements) + "\n", encoding="utf-8")
          constraint_text = "\n".join(constraints) + ("\n" if constraints else "")
          (output_dir / "constraints.txt").write_text(constraint_text, encoding="utf-8")
          (output_dir / "ignore-vulns.txt").write_text(
              "\n".join(ignore_vulns) + ("\n" if ignore_vulns else ""),
              encoding="utf-8",
          )
          (output_dir / "constraint-urls.txt").write_text(
              "\n".join(constraint_urls) + ("\n" if constraint_urls else ""),
              encoding="utf-8",
          )
          PY
      - name: Install canary audit dependencies
        env:
          EXTRA: ${{ matrix.extra }}
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          install_args=()
          if [ -s artifacts/security/generated/constraint-urls.txt ]; then
            while IFS= read -r constraint_url; do
              [ -n "${constraint_url}" ] || continue
              install_args+=(--constraint "${constraint_url}")
            done < artifacts/security/generated/constraint-urls.txt
          fi
          if [ -s artifacts/security/generated/constraints.txt ]; then
            install_args+=(-c artifacts/security/generated/constraints.txt)
          fi
          install_args+=(-r artifacts/security/generated/requirements-host.txt)
          python -m pip install "${install_args[@]}"
          package_target="."
          if [ -n "${EXTRA}" ]; then
            package_target=".[${EXTRA}]"
          fi
          python -m pip install --no-deps -e "${package_target}"
      - name: Run pip-audit canary
        run: |
          set -euo pipefail
          mkdir -p artifacts/security
          audit_args=()
          if [ -s artifacts/security/generated/ignore-vulns.txt ]; then
            while IFS= read -r vuln_id; do
              [ -n "${vuln_id}" ] || continue
              audit_args+=(--ignore-vuln "${vuln_id}")
            done < artifacts/security/generated/ignore-vulns.txt
          fi
          pip-audit --local --progress-spinner off "${audit_args[@]}" | tee "artifacts/security/pip-audit-canary-${{ matrix.label }}.log"
      - name: Upload canary security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: truthound-security-canary-${{ matrix.label }}
          path: artifacts/security/*

  codeql:
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, actions]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3

  summary:
    if: always()
    needs:
      - matrix
      - actionlint
      - dependency-review
      - pip-audit
      - pip-audit-canary
      - codeql
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Validate security results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python - <<'PY'
          import json
          import os
          needs = json.loads(os.environ["NEEDS_JSON"])
          failures = {
              name: details["result"]
              for name, details in needs.items()
              if details["result"] not in {"success", "skipped"}
          }
          if failures:
              raise SystemExit(f"Security workflow failed: {failures}")
          print("Security summary passed")
          PY
