name: Security

on:
  pull_request:
  push:
    branches: ["main"]
  schedule:
    - cron: "30 18 * * *"
  workflow_call:
    inputs:
      lane:
        required: false
        type: string
        default: release
  workflow_dispatch:
    inputs:
      lane:
        description: Security lane to emulate
        required: true
        default: release
        type: choice
        options:
          - pr
          - main
          - release
          - nightly

concurrency:
  group: security-${{ github.event.pull_request.number || github.ref }}-${{ inputs.lane || github.event.inputs.lane || 'event' }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/actionlint@v1

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  pip-audit:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install audit dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          python -m pip install -e ".[dev,airflow,dagster,prefect,dbt,kestra,opentelemetry]" "truthound>=3.0,<4.0"
      - name: Run pip-audit
        run: pip-audit --progress-spinner off

  codeql:
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, actions]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3

  summary:
    if: always()
    needs:
      - actionlint
      - dependency-review
      - pip-audit
      - codeql
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Validate security results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python - <<'PY'
          import json
          import os
          needs = json.loads(os.environ["NEEDS_JSON"])
          failures = {
              name: details["result"]
              for name, details in needs.items()
              if details["result"] not in {"success", "skipped"}
          }
          if failures:
              raise SystemExit(f"Security workflow failed: {failures}")
          print("Security summary passed")
          PY
