name: CI PR

on:
  pull_request:

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
      all_platforms: ${{ steps.classify.outputs.all_platforms }}
      airflow: ${{ steps.classify.outputs.airflow }}
      prefect: ${{ steps.classify.outputs.prefect }}
      dagster: ${{ steps.classify.outputs.dagster }}
      mage_kestra: ${{ steps.classify.outputs.mage_kestra }}
      dbt: ${{ steps.classify.outputs.dbt }}
    steps:
      - uses: actions/checkout@v5
      - id: classify
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/ci/pr_change_filter.py \
            --repository "${{ github.repository }}" \
            --pull-request-number "${{ github.event.pull_request.number }}" \
            --github-output "$GITHUB_OUTPUT"

  foundation:
    permissions:
      contents: read
      checks: write
    uses: ./.github/workflows/ci-foundation.yml
    with:
      lane: pr

  shared-runtime:
    if: needs.changes.outputs.docs_only != 'true'
    needs:
      - changes
      - foundation
    uses: ./.github/workflows/shared-runtime.yml
    with:
      lane: pr

  airflow:
    if: needs.changes.outputs.all_platforms == 'true' || needs.changes.outputs.airflow == 'true'
    needs:
      - changes
      - foundation
    uses: ./.github/workflows/airflow.yml
    with:
      lane: pr

  prefect:
    if: needs.changes.outputs.all_platforms == 'true' || needs.changes.outputs.prefect == 'true'
    needs:
      - changes
      - foundation
    uses: ./.github/workflows/prefect.yml
    with:
      lane: pr

  dagster:
    if: needs.changes.outputs.all_platforms == 'true' || needs.changes.outputs.dagster == 'true'
    needs:
      - changes
      - foundation
    uses: ./.github/workflows/dagster.yml
    with:
      lane: pr

  mage-kestra:
    if: needs.changes.outputs.all_platforms == 'true' || needs.changes.outputs.mage_kestra == 'true'
    needs:
      - changes
      - foundation
    uses: ./.github/workflows/mage-kestra.yml
    with:
      lane: pr

  dbt:
    if: needs.changes.outputs.all_platforms == 'true' || needs.changes.outputs.dbt == 'true'
    needs:
      - changes
      - foundation
    uses: ./.github/workflows/dbt.yml
    with:
      lane: pr

  summary:
    if: always()
    needs:
      - foundation
      - shared-runtime
      - airflow
      - prefect
      - dagster
      - mage-kestra
      - dbt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Validate PR CI results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python - <<'PY'
          import json
          import os
          needs = json.loads(os.environ["NEEDS_JSON"])
          failures = {
              name: details["result"]
              for name, details in needs.items()
              if details["result"] not in {"success", "skipped"}
          }
          if failures:
              raise SystemExit(f"CI PR failed: {failures}")
          print("CI PR summary passed")
          PY
