name: Prefect

on:
  workflow_call:
    inputs:
      lane:
        required: false
        type: string
        default: pr
  workflow_dispatch:
    inputs:
      lane:
        description: CI lane to emulate
        required: true
        default: pr
        type: choice
        options:
          - pr
          - main
          - release
          - nightly

concurrency:
  group: prefect-${{ github.event.pull_request.number || github.ref }}-${{ inputs.lane || github.event.inputs.lane || 'manual' }}
  cancel-in-progress: true

jobs:
  matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      python_version: ${{ steps.export.outputs.python_version }}
      truthound_range: ${{ steps.export.outputs.truthound_range }}
      version_matrix: ${{ steps.export.outputs.version_matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - id: export
        name: Export support matrix
        run: |
          python scripts/ci/export_support_matrix.py workflow \
            --workflow prefect \
            --lane "${{ inputs.lane || github.event.inputs.lane || 'pr' }}" \
            --github-output "$GITHUB_OUTPUT"

  prefect:
    needs: matrix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.version_matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.matrix.outputs.python_version }}
          cache: pip
      - name: Install Prefect dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "prefect==${{ matrix.version }}"
          python -m pip install -e ".[dev,prefect,opentelemetry]" "truthound${{ needs.matrix.outputs.truthound_range }}"
      - name: Run Prefect suites
        run: |
          set -euo pipefail
          mkdir -p artifacts/prefect
          python -m pytest -q \
            packages/prefect/tests/test_blocks.py \
            packages/prefect/tests/test_tasks.py \
            packages/prefect/tests/test_flows.py \
            packages/prefect/tests/test_utils.py \
            --junitxml="artifacts/prefect/junit-${{ matrix.version }}.xml" \
            --cov=common \
            --cov=packages/prefect/src/truthound_prefect \
            --cov-report="xml:artifacts/prefect/coverage-${{ matrix.version }}.xml" | tee "artifacts/prefect/pytest-${{ matrix.version }}.log"
      - name: Upload Prefect artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: truthound-prefect-${{ matrix.version }}
          path: artifacts/prefect/*

  summary:
    if: always()
    needs:
      - prefect
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Validate Prefect results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python - <<'PY'
          import json
          import os
          needs = json.loads(os.environ["NEEDS_JSON"])
          failures = {
              name: details["result"]
              for name, details in needs.items()
              if details["result"] not in {"success", "skipped"}
          }
          if failures:
              raise SystemExit(f"Prefect CI failed: {failures}")
          print("Prefect summary passed")
          PY
